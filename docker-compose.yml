services:

  # =========================
  # NESTJS APP
  # =========================
  app:
    build: .
    container_name: ${APP_CONTAINER_NAME:-nest_app}

    ports:
      - "${APP_HOST_PORT:-3000}:${PORT:-3000}"

    depends_on:
      mongodb:
        condition: service_healthy
      redis:
        condition: service_started
      rabbitmq:
        condition: service_healthy

    environment:
      PORT: ${PORT:-3000}
      MONGO_URI: ${MONGO_URI:-mongodb://mongodb:27017/eurisko_db?replicaSet=rs0}
      REDIS_HOST: ${REDIS_HOST:-redis}
      REDIS_PORT: ${REDIS_PORT:-6379}
      JWT_SECRET: ${JWT_SECRET:-local-dev-jwt-secret}
      EMAIL: ${EMAIL:-}
      EMAIL_PASS: ${EMAIL_PASS:-}
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY:-}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET:-}
      RABBITMQ_URL: ${RABBITMQ_URL:-amqp://rabbitmq:5672}
      RABBITMQ_PREFETCH: ${RABBITMQ_PREFETCH:-20}

    volumes:
      - .:/app
      - /app/node_modules

    command: npm run start:dev

  # =========================
  # MONGODB
  # =========================
  mongodb:
    image: mongo:latest
    container_name: ${MONGO_CONTAINER_NAME:-mongodb}

    command: ["mongod", "--replSet", "rs0", "--bind_ip_all"]

    ports:
      - "${MONGO_HOST_PORT:-27019}:27017"

    volumes:
      - mongo_data:/data/db

    healthcheck:
      test:
        [
          "CMD-SHELL",
          "mongosh --quiet --eval \"try { rs.status().ok } catch (e) { rs.initiate({_id:'rs0',members:[{_id:0,host:'mongodb:27017'}]}).ok }\"",
        ]
      interval: 5s
      timeout: 5s
      retries: 12

  # =========================
  # REDIS
  # =========================
  redis:
    image: redis:latest
    container_name: ${REDIS_CONTAINER_NAME:-eurisko_redis}

    ports:
      - "${REDIS_HOST_PORT:-6379}:6379"

    volumes:
      - redis_data:/data

  # =========================
  # RABBITMQ
  # =========================
  rabbitmq:
    image: rabbitmq:3-management
    container_name: ${RABBITMQ_CONTAINER_NAME:-eurisko_rabbitmq}

    ports:
      - "${RABBITMQ_HOST_PORT:-5672}:5672"
      - "${RABBITMQ_MANAGEMENT_HOST_PORT:-15672}:15672"

    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 5s
      timeout: 5s
      retries: 12

# =========================
# VOLUMES
# =========================
volumes:
  mongo_data:
  redis_data:
