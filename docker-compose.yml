services:

  # =========================
  # NESTJS APP
  # =========================
  app:
    build: .
    container_name: nest_app

    ports:
      - "3000:3000"

    depends_on:
      mongodb:
        condition: service_healthy
      redis:
        condition: service_started

    env_file:
      - .env

    volumes:
      - .:/app
      - /app/node_modules

    command: npm run start:dev

  # =========================
  # MONGODB
  # =========================
  mongodb:
    image: mongo:latest
    container_name: mongodb

    command: ["mongod", "--replSet", "rs0", "--bind_ip_all"]

    ports:
      - "27019:27017"

    volumes:
      - mongo_data:/data/db

    healthcheck:
      test:
        [
          "CMD-SHELL",
          "mongosh --quiet --eval \"try { rs.status().ok } catch (e) { rs.initiate({_id:'rs0',members:[{_id:0,host:'mongodb:27017'}]}).ok }\"",
        ]
      interval: 5s
      timeout: 5s
      retries: 12

  # =========================
  # REDIS
  # =========================
  redis:
    image: redis:latest
    container_name: eurisko_redis

    ports:
      - "6379:6379"

    volumes:
      - redis_data:/data

# =========================
# VOLUMES
# =========================
volumes:
  mongo_data:
  redis_data:
